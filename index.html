<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Catching Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Added Top Score Display -->
        <div id="scoreboard">
            Score: <span id="score-val">0</span> | Top Score: <span id="top-score-val">0</span>
        </div>
        
       <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <!-- Updated control instructions -->
        <p>Use <b>Left/Right Arrows</b> to move.</p>
        <p>Press <b>P</b> or <b>Spacebar</b> to Pause / Unpause.</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
